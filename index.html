<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Targets — Blufox Retail</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#0a0a0a;--card2:#0e0e0e;--border:#1c1c1c;--border2:#282828;--text:#f0f0f0;--dim:#555;--teal:#2dd4bf;--amber:#fbbf24;--green:#34d399;--red:#fb7185}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
.bar{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;padding:.55rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;font-size:.95rem;background:linear-gradient(135deg,var(--teal),var(--amber));box-shadow:0 2px 10px rgba(45,212,191,.2)}
.bar h1{font-size:1.15rem;font-weight:900;letter-spacing:-.02em}
.spacer{flex:1}
.btn{padding:.3rem .65rem;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:.2rem}
.btn:hover{border-color:#333}
.btn-t{border-color:var(--teal);color:var(--teal)}
select,input[type="number"]{padding:.3rem .45rem;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;font-size:.75rem;outline:none}
select{font-size:.8rem;font-weight:600;padding:.3rem .5rem;min-width:160px}
.cg{display:flex;align-items:center;gap:.2rem}
.cl{font-size:.65rem;color:var(--dim);font-weight:600}

/* Info strip */
.strip{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;padding:.2rem .8rem;border-bottom:1px solid var(--border);flex-shrink:0;font-size:.58rem;font-weight:600}
.strip .l{color:var(--dim)}.strip .v{font-family:'Space Mono',monospace}.strip .a{color:var(--teal)}.strip .b{color:var(--amber)}.strip .sep{color:#222}
.strip .ti{display:flex;align-items:center;gap:.08rem}
.strip .ti label{font-size:.48rem;font-weight:700;color:var(--dim)}
.strip .ti input{width:30px;padding:.08rem .12rem;border-radius:3px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:.52rem;text-align:center}

/* Upload */
.upload{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;cursor:pointer}
.upload:hover .ic{transform:scale(1.1)}
.upload .ic{font-size:2rem;transition:transform .15s}.upload .tt{font-size:.85rem;font-weight:700}.upload .hh{font-size:.6rem;color:var(--dim)}

/* Center area */
#dash{display:none;flex:1;align-items:center;justify-content:center;padding:1rem}

/* ═══ THE BOX ═══ */
.box{
  border:2px solid var(--border2);
  border-radius:14px;
  background:var(--card);
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
  min-width:75vw;
}
.box-title{
  padding:.75rem 1.2rem;font-size:1.2rem;font-weight:900;
  text-transform:uppercase;letter-spacing:.06em;
  background:var(--card2);border-bottom:2px solid var(--border2);
  display:flex;align-items:center;gap:.5rem;
}
.box-title span{color:var(--teal)}

table{border-collapse:collapse;width:100%}

/* Header */
thead th{
  padding:.65rem .8rem;
  font-size:.9rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
  text-align:center;background:var(--card2);border-bottom:2px solid var(--border2);
  border-right:2px solid var(--border2);white-space:nowrap;
}
thead th:first-child{text-align:left;padding-left:1rem}
thead th:last-child{border-right:none}
.h-mob{color:var(--teal)}
.h-gp{color:var(--amber)}
.h-rgu{color:#a78bfa}
.h-nt{color:#fb923c}
.h-gig{color:var(--green)}
.h-prem{color:#f472b6}
.h-acc{color:#fbbf24}

/* Cells */
td{
  padding:.6rem .7rem;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.05);
  border-right:2px solid var(--border2);
  font-family:'Space Mono',monospace;
  font-size:1.3rem;font-weight:700;
}
td:first-child{
  text-align:left;padding-left:1rem;
  font-family:'Outfit',sans-serif;font-size:1rem;font-weight:800;
}
td:last-child{border-right:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}

/* Status */
.ok{color:var(--green)}
.no{color:var(--text)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dg{background:var(--green);box-shadow:0 0 6px var(--green)}
.dr{background:var(--red);box-shadow:0 0 6px var(--red)}

/* SM name */
.sm{display:block;font-size:.65rem;color:var(--dim);font-weight:500;margin-top:2px}

/* Totals */
tr.tot td{border-top:2px solid var(--border2);background:var(--card2);font-size:1.2rem}
tr.tot td:first-child{color:var(--dim);font-size:.9rem}

@media print{
  body{background:#fff!important;color:#111!important;overflow:visible!important;height:auto!important}
  .bar,.strip{display:none!important}
  #dash{display:flex!important}
  .box{border:1px solid #ccc!important;box-shadow:none!important}
  thead th{background:#f5f5f5!important;color:#333!important;border-color:#ddd!important}
  td{border-color:#eee!important;color:#111!important}
  .ok{color:#16a34a!important}.dg{background:#16a34a!important}.dr{background:#dc2626!important}
}
</style>
</head>
<body>

<div class="bar">
  <div class="logo">🎯</div>
  <h1>Daily Targets</h1>
  <div class="spacer"></div>
  <div class="cg"><span class="cl">District:</span><select id="dsel" onchange="render()"></select></div>
  <div class="cg"><span class="cl">Fiscal:</span><input type="number" id="fov" min="1" max="31" style="width:30px" onchange="render()"></div>
  <div class="cg"><span class="cl">Cal:</span><input type="number" id="cov" min="1" max="31" style="width:30px" onchange="render()"></div>
  <label class="btn btn-t">📂 Upload<input type="file" id="fi" accept=".xlsx,.xls" style="display:none" onchange="load(this.files[0])"></label>
  <button class="btn" onclick="window.print()" id="pbtn" style="display:none">🖨️</button>
</div>

<div class="strip">
  <span class="l">📅 Cal</span><span class="v" id="cv"></span><span class="a" id="cr"></span>
  <span class="sep">|</span>
  <span class="l">⚡ Fiscal</span><span class="v" id="fv"></span><span class="b" id="fr"></span>
  <span class="sep" style="margin-left:auto">|</span>
  <span class="l">⚙️</span>
  <div class="ti"><label>MCR≤</label><input value="7" data-k="mcr" onchange="TH[this.dataset.k]=+this.value||0;render()"></div>
  <div class="ti"><label>FCR≥</label><input value="10" data-k="fcr" onchange="TH[this.dataset.k]=+this.value||0;render()"></div>
  <div class="ti"><label>NT≥</label><input value="1.5" step="0.1" data-k="nt" onchange="TH[this.dataset.k]=+this.value||0;render()"></div>
  <div class="ti"><label>Gig≥</label><input value="80" data-k="gig" onchange="TH[this.dataset.k]=+this.value||0;render()"></div>
  <div class="ti"><label>Prem≥</label><input value="80" data-k="prem" onchange="TH[this.dataset.k]=+this.value||0;render()"></div>
  <div class="ti"><label>Acc≥$</label><input value="30" data-k="acc" onchange="TH[this.dataset.k]=+this.value||0;render()"></div>
</div>

<div class="upload" id="uzone" ondragover="event.preventDefault()" ondrop="event.preventDefault();load(event.dataTransfer.files[0])" onclick="document.getElementById('fi').click()">
  <div class="ic">📊</div>
  <div class="tt">Drop your sales report here</div>
  <div class="hh">.xlsx Blufox report</div>
</div>

<div id="dash"></div>

<script>
var S=[],now=new Date();
var TH={mcr:7,fcr:10,nt:1.5,gig:80,prem:80,acc:30};

function fisBounds(){var y=now.getFullYear(),m=now.getMonth(),d=now.getDate();if(d>=22)return{s:new Date(y,m,22),e:new Date(y,m+1,21)};return{s:new Date(y,m-1,22),e:new Date(y,m,21)};}
function getF(){var ov=parseInt(document.getElementById('fov').value)||0,b=fisBounds(),tot=Math.round((b.e-b.s)/864e5)+1,el=ov>0?ov:Math.round((now-b.s)/864e5)+1;return{el:el,tot:tot,rem:Math.max(1,tot-el)};}
function getC(){var ov=parseInt(document.getElementById('cov').value)||0,el=ov>0?ov:now.getDate(),tot=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();return{el:el,tot:tot,rem:Math.max(1,tot-el)};}
function pf(v){var n=parseFloat(v);return isNaN(n)?0:n;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function load(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]];
      var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      var hIdx=0;
      for(var r=0;r<20;r++){for(var c=0;c<10;c++){if(String((raw[r]||[])[c]).toLowerCase().trim()==='rank'){hIdx=r;break;}}if(hIdx>0)break;}
      S=[];
      for(var r=hIdx+1;r<raw.length;r++){
        var w=raw[r];if(!w||!w[2])continue;var nm=String(w[2]).trim();
        if(!nm||!w[0]||nm.toLowerCase().indexOf('total')>=0)continue;
        S.push({nm:nm,rsd:String(w[4]||'').trim(),dm:String(w[5]||'').trim()||'Unassigned',sm:String(w[6]||'').trim(),
          gpEst:pf(w[12]),gpTgt:pf(w[15]),trafDay:pf(w[30]),fInst:pf(w[38]),fMob:pf(w[39]),fNT:pf(w[40]),
          hsi:pf(w[59]),gig:pf(w[60]),mobMTD:pf(w[63]),prem:pf(w[70]),accN:pf(w[81])});
      }
      if(!S.length){alert('No store data found.');return;}
      var sel=document.getElementById('dsel');sel.innerHTML='';
      var jD={},oD={};
      for(var i=0;i<S.length;i++){var s=S[i];if(s.rsd.toLowerCase().indexOf('bilbrey')>=0)jD[s.dm]=(jD[s.dm]||0)+1;else oD[s.dm]=(oD[s.dm]||0)+1;}
      Object.keys(jD).sort().forEach(function(d){sel.innerHTML+='<option value="'+esc(d)+'">★ '+d+' ('+jD[d]+')</option>';});
      var oK=Object.keys(oD).sort();
      if(oK.length){sel.innerHTML+='<option disabled>───</option>';oK.forEach(function(d){sel.innerHTML+='<option value="'+esc(d)+'">'+d+' ('+oD[d]+')</option>';});}
      document.getElementById('fov').value=getF().el;document.getElementById('cov').value=getC().el;
      document.getElementById('uzone').style.display='none';document.getElementById('dash').style.display='flex';document.getElementById('pbtn').style.display='';
      render();
    }catch(err){alert('Error: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function calc(s){
  var f=getF(),c=getC(),pT=Math.ceil((s.trafDay||1)*f.tot);
  var mobTgt=Math.floor((TH.mcr/100)*pT),mobN=Math.max(0,mobTgt-s.fMob);
  var gpN=Math.max(0,Math.round(s.gpTgt-s.gpEst));
  var rguTgt=Math.ceil((TH.fcr/100)*pT),rguN=Math.max(0,rguTgt-s.fInst);
  var ntTgt=Math.ceil((TH.nt/100)*pT),ntN=Math.max(0,ntTgt-s.fNT);
  var gigTgt=Math.ceil((TH.gig/100)*Math.max(1,s.hsi)),gigN=Math.max(0,gigTgt-s.gig);
  var premTgt=Math.ceil((TH.prem/100)*mobTgt),premN=Math.max(0,premTgt-s.prem);
  var accTgt=Math.round(TH.acc*mobTgt),accN=Math.max(0,accTgt-Math.round(s.accN));
  return{
    mob:{d:Math.ceil(mobN/f.rem),ok:mobN===0},
    gp:{d:Math.ceil(gpN/c.rem),ok:gpN===0},
    rgu:{d:Math.ceil(rguN/f.rem),ok:rguN===0},
    nt:{d:Math.ceil(ntN/f.rem),ok:ntN===0},
    gig:{d:Math.ceil(gigN/c.rem),ok:gigN===0},
    prem:{d:Math.ceil(premN/f.rem),ok:premN===0},
    acc:{d:Math.ceil(accN/f.rem),ok:accN===0}
  };
}

function render(){
  var f=getF(),c=getC();
  document.getElementById('cv').textContent=c.el+'/'+c.tot;
  document.getElementById('cr').textContent=c.rem+'d left';
  document.getElementById('fv').textContent=f.el+'/'+f.tot;
  document.getElementById('fr').textContent=f.rem+'d left';

  var dm=document.getElementById('dsel').value,stores=[];
  for(var i=0;i<S.length;i++)if(S[i].dm===dm)stores.push(S[i]);
  stores.sort(function(a,b){return a.nm.localeCompare(b.nm);});
  if(!stores.length){document.getElementById('dash').innerHTML='<div style="color:var(--dim)">No stores.</div>';return;}

  var h='<div class="box"><div class="box-title">🎯 <span>Daily Goals</span></div><table><thead><tr>';
  h+='<th style="color:var(--dim)">Store</th>';
  h+='<th class="h-mob">📱 Mobile</th>';
  h+='<th class="h-gp">💰 GP</th>';
  h+='<th class="h-rgu">🏠 RGUs</th>';
  h+='<th class="h-nt">📺 Non-Trad</th>';
  h+='<th class="h-gig">🚀 Gig</th>';
  h+='<th class="h-prem">💎 Premium</th>';
  h+='<th class="h-acc">🎧 Acc $</th>';
  h+='</tr></thead><tbody>';

  var t={mob:0,gp:0,rgu:0,nt:0,gig:0,prem:0,acc:0};

  for(var i=0;i<stores.length;i++){
    var s=stores[i],g=calc(s);
    t.mob+=g.mob.d;t.gp+=g.gp.d;t.rgu+=g.rgu.d;t.nt+=g.nt.d;t.gig+=g.gig.d;t.prem+=g.prem.d;t.acc+=g.acc.d;
    h+='<tr>';
    h+='<td>'+esc(s.nm)+'<span class="sm">'+esc(s.sm)+'</span></td>';
    h+=td(g.mob,0)+td(g.gp,1)+td(g.rgu,0)+td(g.nt,0)+td(g.gig,0)+td(g.prem,0)+td(g.acc,1);
    h+='</tr>';
  }

  h+='<tr class="tot">';
  h+='<td>DISTRICT</td>';
  h+='<td>'+t.mob+'</td><td>$'+kF(t.gp)+'</td><td>'+t.rgu+'</td><td>'+t.nt+'</td><td>'+t.gig+'</td><td>'+t.prem+'</td><td>$'+kF(t.acc)+'</td>';
  h+='</tr></tbody></table></div>';

  document.getElementById('dash').innerHTML=h;
}

function td(m,isDollar){
  var dot=m.ok?'<span class="dot dg"></span>':'<span class="dot dr"></span>';
  var cls=m.ok?'ok':'no';
  var v=isDollar?'$'+kF(m.d):''+m.d;
  return '<td class="'+cls+'">'+dot+v+'</td>';
}

function kF(n){if(n>=100000)return(n/1000).toFixed(0)+'k';if(n>=10000)return(n/1000).toFixed(1)+'k';if(n<0)return'0';return n.toLocaleString('en-US',{maximumFractionDigits:0});}
</script>
</body>
</html>
